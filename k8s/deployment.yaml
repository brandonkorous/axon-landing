apiVersion: apps/v1
kind: Deployment
metadata:
    name: axon-landing
    namespace: axon
    labels:
        app: axon-landing
spec:
    replicas: 2
    selector:
        matchLabels:
            app: axon-landing
    template:
        metadata:
            labels:
                app: axon-landing
        spec:
            containers:
                - name: axon-landing
                  image: ghcr.io/brandonkorous/axon-landing:latest
                  ports:
                      - containerPort: 3000
                  resources:
                      requests:
                          cpu: 100m
                          memory: 128Mi
                      limits:
                          cpu: 500m
                          memory: 256Mi
                  readinessProbe:
                      httpGet:
                          path: /
                          port: 3000
                      initialDelaySeconds: 5
                      periodSeconds: 10
                  livenessProbe:
                      httpGet:
                          path: /
                          port: 3000
                      initialDelaySeconds: 10
                      periodSeconds: 30
